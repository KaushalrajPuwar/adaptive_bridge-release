# ── Example configuration: Adaptive Bridge stress profile ───────────
# High-throughput config: faster evaluation, larger windows, tighter safety.
# To use your own topics, edit the topics[] list below.

topics:
  - id: "scan_main"
    input_topic: "/scan"
    critical_output: "/adaptive_bridge/critical/scan"
    noncritical_output: "/adaptive_bridge/noncritical/scan"
    message_type: "sensor_msgs/LaserScan"
    qos_overrides: {}

qos_profiles:
  reliable_depth10:
    reliability: RELIABLE
    history: KEEP_LAST
    depth: 10
    durability: VOLATILE
  besteffort_depth5_lifespan500ms:
    reliability: BEST_EFFORT
    history: KEEP_LAST
    depth: 5
    durability: VOLATILE
    lifespan_ms: 500
  besteffort_depth5:
    reliability: BEST_EFFORT
    history: KEEP_LAST
    depth: 5
    durability: VOLATILE

topic_qos_profiles:
  scan_main:
    critical: "reliable_depth10"
    noncritical: "besteffort_depth5_lifespan500ms"

classifier:
  enabled: true
  subscriber_id: ""
  evaluate_rate_hz: 5.0
  demote_loss_threshold: 0.04
  promote_loss_threshold: 0.02
  demote_rtt_ms: 80.0
  promote_rtt_ms: 40.0
  hysteresis_count: 5
  allow_unknown_state: false

probes:
  enabled: true
  rate_hz: 10.0
  rtt_threshold_ms: 80.0
  loss_threshold: 0.04
  jitter_threshold_ms: 15.0
  window_size: 80
  hysteresis_count: 5
  timeout_ms: 300
  request_topic: "/adaptive_bridge/probe_req"
  response_topic: "/adaptive_bridge/probe_resp"

routing_policy:
  critical_always_forward: true
  noncritical_enabled: true
  noncritical_max_rate_hz: 3.0
  noncritical_drop_policy: "drop_stale"
  stale_threshold_ms: 300
  modes:
    normal:
      noncritical_max_rate_hz: 3.0
      noncritical_depth: 3
      noncritical_drop_policy: "drop_stale"
      stale_threshold_ms: 300
      max_noncritical_queue: 10
    degraded:
      noncritical_max_rate_hz: 1.0
      noncritical_depth: 1
      noncritical_drop_policy: "drop_stale"
      stale_threshold_ms: 150
      max_noncritical_queue: 5
    disabled:
      noncritical_max_rate_hz: 0.0
      noncritical_depth: 0
      noncritical_drop_policy: "drop_oldest"
      stale_threshold_ms: 0
      max_noncritical_queue: 0
    emergency:
      noncritical_max_rate_hz: 0.0
      noncritical_depth: 0
      noncritical_drop_policy: "drop_oldest"
      stale_threshold_ms: 0
      max_noncritical_queue: 0
    failure:
      noncritical_max_rate_hz: 0.0
      noncritical_depth: 0
      noncritical_drop_policy: "drop_oldest"
      stale_threshold_ms: 0
      max_noncritical_queue: 0

safety:
  preserve_critical_path: true
  allow_noncritical_degrade: true
  max_noncritical_queue: 10
  overload_drop_noncritical_first: true

security:
  trust_mode: "default_deny"
  allow_legacy_node_name_overrides: false
  enable_probe_hmac: true
  max_probe_rate_hz: 15.0
  hmac_secret: ""
  replay_window_ms: 30000

diagnostics:
  enabled: true
  publish_interval_s: 0.5
  topic: "/adaptive_bridge/diagnostics"
  verbosity: "debug"

overrides: {}
