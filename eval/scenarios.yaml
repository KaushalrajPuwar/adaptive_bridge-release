scenarios:
- name: baseline_clean
  mode: baseline
  compose_file: docker/docker-compose.baseline.yml
  duration_s: 120
  impairment:
    enabled: false
    bandwidth_kbit: 0
  toggle: false
  classifier_enabled: false
  description: Baseline without bridge or impairment — clean throughput reference
- name: baseline_mild
  mode: baseline
  compose_file: docker/docker-compose.baseline.yml
  duration_s: 180
  impairment:
    enabled: true
    bandwidth_kbit: 50000
    loss_model: gemodel
    loss_p: 1
    loss_r: 15
    loss_good_pct: 0.5
    loss_bad_pct: 30
  toggle: false
  classifier_enabled: false
  description: Baseline with mild GE bursty loss (~2.3% avg) — occasional WiFi congestion
- name: baseline_moderate
  mode: baseline
  compose_file: docker/docker-compose.baseline.yml
  duration_s: 180
  impairment:
    enabled: true
    bandwidth_kbit: 50000
    loss_model: gemodel
    loss_p: 3
    loss_r: 15
    loss_good_pct: 0.5
    loss_bad_pct: 40
  toggle: false
  classifier_enabled: false
  description: Baseline with moderate GE bursty loss (~7.1% avg) — heavily congested WiFi
- name: baseline_strong
  mode: baseline
  compose_file: docker/docker-compose.baseline.yml
  duration_s: 180
  impairment:
    enabled: true
    bandwidth_kbit: 50000
    loss_model: gemodel
    loss_p: 2
    loss_r: 10
    loss_good_pct: 1.0
    loss_bad_pct: 50
  toggle: false
  classifier_enabled: false
  description: Baseline with strong GE bursty loss (~9.2% avg) — edge-of-coverage WiFi
- name: bridge_clean
  mode: adaptive
  compose_file: docker/docker-compose.adaptive.yml
  duration_s: 120
  impairment:
    enabled: false
    bandwidth_kbit: 0
  toggle: false
  classifier_enabled: true
  description: Bridge with full stack, no impairment — overhead measurement
- name: bridge_mild
  mode: adaptive
  compose_file: docker/docker-compose.adaptive.yml
  duration_s: 180
  impairment:
    enabled: true
    bandwidth_kbit: 50000
    loss_model: gemodel
    loss_p: 1
    loss_r: 15
    loss_good_pct: 0.5
    loss_bad_pct: 30
  toggle: false
  classifier_enabled: true
  description: Adaptive bridge with mild GE bursty loss (~2.3% avg) — primary isolation evidence
- name: bridge_moderate
  mode: adaptive
  compose_file: docker/docker-compose.adaptive.yml
  duration_s: 180
  impairment:
    enabled: true
    bandwidth_kbit: 50000
    loss_model: gemodel
    loss_p: 3
    loss_r: 15
    loss_good_pct: 0.5
    loss_bad_pct: 40
  toggle: false
  classifier_enabled: true
  description: Adaptive bridge with moderate GE bursty loss (~7.1% avg) — core isolation proof
- name: bridge_strong
  mode: adaptive
  compose_file: docker/docker-compose.adaptive.yml
  duration_s: 180
  impairment:
    enabled: true
    bandwidth_kbit: 50000
    loss_model: gemodel
    loss_p: 2
    loss_r: 10
    loss_good_pct: 1.0
    loss_bad_pct: 50
  toggle: false
  classifier_enabled: true
  description: Adaptive bridge with strong GE bursty loss (~9.2% avg) — robustness boundary
- name: bridge_toggle
  mode: adaptive
  compose_file: docker/docker-compose.adaptive.yml
  duration_s: 240
  impairment:
    enabled: true
    bandwidth_kbit: 50000
    loss_model: gemodel
    loss_p: 3
    loss_r: 15
    loss_good_pct: 0.5
    loss_bad_pct: 40
  toggle: true
  toggle_interval_s: 60
  classifier_enabled: true
  description: Toggle moderate impairment every 60s — hysteresis/stability test
- name: ablation_no_classifier
  mode: adaptive
  compose_file: docker/docker-compose.adaptive.ablation.yml
  duration_s: 180
  impairment:
    enabled: true
    bandwidth_kbit: 50000
    loss_model: gemodel
    loss_p: 3
    loss_r: 15
    loss_good_pct: 0.5
    loss_bad_pct: 40
  toggle: false
  classifier_enabled: false
  description: Bridge with moderate GE bursty loss (~7.1% avg), classifier disabled — isolate topic-split vs classifier benefit
