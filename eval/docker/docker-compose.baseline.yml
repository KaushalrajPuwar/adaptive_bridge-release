# docker-compose.baseline.yml
# Baseline topology: publisher + 2 subscribers. No bridge.
services:
  publisher:
    image: adaptive_bridge_eval:latest
    command: python3 /nodes/publisher_node.py
    cap_add:
      - NET_ADMIN
    environment:
      - FASTRTPS_DEFAULT_PROFILES_FILE=/fastdds_profiles.xml
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DOMAIN_ID=42
      - PUBLISH_RATE_HZ=30
      - RESULTS_DIR=/results
    volumes:
      - ../nodes:/nodes:ro
      - ./fastdds_profiles.xml:/fastdds_profiles.xml:ro
      - ../results:/results:rw
    networks:
      eval_net:
        ipv4_address: 172.28.0.2

  critical_subscriber:
    image: adaptive_bridge_eval:latest
    command: python3 /nodes/critical_subscriber_node.py
    environment:
      - FASTRTPS_DEFAULT_PROFILES_FILE=/fastdds_profiles.xml
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DOMAIN_ID=42
      - SUBSCRIBE_TOPIC=/scan
      - RESULTS_DIR=/results
    volumes:
      - ../nodes:/nodes:ro
      - ./fastdds_profiles.xml:/fastdds_profiles.xml:ro
      - ../results:/results:rw
    networks:
      eval_net:
        ipv4_address: 172.28.0.3
    depends_on:
      - publisher

  slow_subscriber:
    image: adaptive_bridge_eval:latest
    command: python3 /nodes/slow_subscriber_node.py
    cap_add:
      - NET_ADMIN
    environment:
      - FASTRTPS_DEFAULT_PROFILES_FILE=/fastdds_profiles.xml
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DOMAIN_ID=42
      - SUBSCRIBE_TOPIC=/scan
      - CALLBACK_DELAY_MS=0
      - RESULTS_DIR=/results
    volumes:
      - ../nodes:/nodes:ro
      - ./fastdds_profiles.xml:/fastdds_profiles.xml:ro
      - ../results:/results:rw
    networks:
      eval_net:
        ipv4_address: 172.28.0.4
    depends_on:
      - publisher

networks:
  eval_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
